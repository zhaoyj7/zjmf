<!-- 页面独有样式 -->
<link rel="stylesheet" href="/plugins/addon/idcsmart_file_download/template/clientarea/mobile/mfm301/css/news.css">
</head>

<body>
  <div id="template" v-cloak class="help-page">
    <van-sticky>
      <van-nav-bar :title="lang.source_title" safe-area-inset-top left-arrow @click-left="goBack">
      </van-nav-bar>
      <form action="/">
        <van-search class="search-input fillter-search" v-model="downParams.keywords" :placeholder="lang.cloud_tip_2"
          @search="initDownList" @clear="initDownList" show-action>
          <template #action>
            <van-dropdown-menu>
              <van-dropdown-item :title="downLoadTypeText" @change="initDownList" v-model="selectDownType"
                :options="downType">
              </van-dropdown-item>
            </van-dropdown-menu>
          </template>
        </van-search>
      </form>
    </van-sticky>
    <van-tabs class="tab-box" v-model:active="activeIndex" @change="handleClick" line-width="16px" sticky
      :offset-top="100" title-active-color="var(--van-primary-color)">
      <van-tab :title="lang.source_text6" name="1" v-if="havePlugin('IdcsmartHelp')">
      </van-tab>
      <van-tab :title="lang.source_tab2" name="2" v-if="havePlugin('IdcsmartNews')">
      </van-tab>
      <van-tab :title="lang.source_tab3" name="3" v-if="havePlugin('IdcsmartFileDownload')">
        <div class="down-main">
          <common-list :loading="downLoading" :finished="downFinished" :list="downList" @load="getDownList">
            <template #default="{item}">
              <div class="file-item">
                <div class="file-left">
                  <img src="./img/file_icon.png" alt="">
                </div>
                <div class="file-right">
                  <div class="file-title" @click="handelClickfile(item.id)">
                    <span>{{item.name}}</span>
                    <van-icon name="upgrade"></van-icon>
                  </div>
                  <div class="file-type">
                    <div>
                      <span class="file-lebal">{{lang.file_type}}：</span>
                      <span class="file-value">{{item.filetype}}</span>
                    </div>
                    <div>
                      <span class="file-lebal">{{lang.file_size}}：</span>
                      <span class="file-value">{{formateByte(item.filesize)}}</span>
                    </div>
                  </div>
                  <div class="file-des">
                    <span class="file-lebal">{{lang.file_des}}：</span>
                    <span class="file-value">{{item.description || '--'}}</span>
                  </div>
                </div>
              </div>
            </template>
          </common-list>
        </div>
      </van-tab>
    </van-tabs>

  </div>
  <!-- =======页面独有======= -->
  <script src="/plugins/addon/idcsmart_file_download/template/clientarea/mobile/mfm301/lang/index.js"></script>
  <script src="/plugins/addon/idcsmart_file_download/template/clientarea/mobile/mfm301/api/news.js"></script>
  <script src="/plugins/addon/idcsmart_file_download/template/clientarea/mobile/mfm301/js/news.js"></script>
