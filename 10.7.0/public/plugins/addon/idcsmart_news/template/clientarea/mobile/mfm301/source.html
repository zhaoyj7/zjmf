<!-- 页面独有样式 -->
<link rel="stylesheet" href="/plugins/addon/idcsmart_news/template/clientarea/mobile/mfm301/css/news.css">
</head>

<body>
  <div id="template" v-cloak class="help-page">
    <van-sticky>
      <van-nav-bar :title="lang.source_title" safe-area-inset-top left-arrow @click-left="goBack">
      </van-nav-bar>
      <form action="/">
        <van-search class="search-input fillter-search" v-model="newParams.keywords" :placeholder="lang.cloud_tip_2"
          @search="initNewList" @clear="initNewList" show-action>
          <template #action>
            <van-dropdown-menu>
              <van-dropdown-item :title="newTypeText" @change="initNewList" v-model="selectNewType" :options="newType">
              </van-dropdown-item>
            </van-dropdown-menu>
          </template>
        </van-search>
      </form>
    </van-sticky>
    <van-tabs class="tab-box" v-model:active="activeIndex" @change="handleClick" line-width="16px" sticky
      :offset-top="100" title-active-color="var(--van-primary-color)">
      <van-tab :title="lang.source_text6" name="1" v-if="havePlugin('IdcsmartHelp')">
      </van-tab>
      <van-tab :title="lang.source_tab2" name="2" v-if="havePlugin('IdcsmartNews')">
        <div class="new-main">
          <common-list :loading="newLoading" :finished="newsFinished" :list="newsList" @load="getNewList">
            <!-- 默认插槽 -->
            <template #default="{item}">
              <div class="new-item" @click="goNewDetail(item.id)">
                <div class="item-left">
                  <img v-if="item.img" :src="item.img" class="item-img">
                  <img
                    :src="`/plugins/addon/idcsmart_news/template/clientarea/mobile/mfm301/img/news_0${Math.floor(Math.random() * 4) + 1}.png`"
                    alt="" v-else class="item-img">
                </div>
                <div class="item-right">
                  <p class="title">{{item.title}}</p>
                  <p class="info">
                    <van-icon name="clock-o" class="el-icon-time"></van-icon>
                    <span v-time="item.create_time"></span>
                  </p>
                </div>
              </div>
            </template>
          </common-list>
        </div>
      </van-tab>
      <van-tab :title="lang.source_tab3" name="3" v-if="havePlugin('IdcsmartFileDownload')">
      </van-tab>
    </van-tabs>

  </div>
  <!-- =======页面独有======= -->
  <script src="/plugins/addon/idcsmart_news/template/clientarea/mobile/mfm301/lang/index.js"></script>
  <script src="/{$template_catalog}/template/{$themes}/components/commonList/commonList.js"></script>
  <script src="/plugins/addon/idcsmart_news/template/clientarea/mobile/mfm301/api/news.js"></script>
  <script src="/plugins/addon/idcsmart_news/template/clientarea/mobile/mfm301/js/news.js"></script>
